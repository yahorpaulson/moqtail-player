<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOQtail Player</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="js/player.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="logo">
        <div class="logo-dot"></div>
        MOQtail Player
      </div>
      <div
        style="font-size: 11px; color: var(--text3); font-family: var(--mono)"
        id="serverLabel"
      >
        —
      </div>
      <div class="topbar-spacer"></div>
      <div class="status-badge" id="statusBadge">
        <div class="status-dot"></div>
        <span id="statusText">Disconnected</span>
      </div>
    </div>

    <div class="main">
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="section-label">Connection</div>
          <div class="field">
            <label>Server IP / hostname</label>
            <input type="text" id="serverUrl" placeholder="192.168.1.10" />
          </div>
          <div class="field">
            <label>Port</label>
            <input type="text" id="serverPort" value="4433" />
          </div>
          <div class="field">
            <label>WebTransport path</label>
            <input type="text" id="serverPath" value="/" />
          </div>
          <div class="btn-row" style="margin-top: 10px">
            <button class="btn primary" id="connectBtn">Connect</button>
            <button class="btn danger" id="disconnectBtn" style="display: none">
              Disconnect
            </button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Track</div>
          <div class="field">
            <label>Namespace</label>
            <input
              type="text"
              id="namespace"
              value="moqtail/demo"
              placeholder="moqtail/demo"
            />
          </div>
          <div class="field">
            <label>Track name</label>
            <input
              type="text"
              id="trackName"
              value="video"
              placeholder="video"
            />
          </div>
          <div class="field" style="margin-bottom: 10px">
            <label>Delivery mode</label>
            <div class="toggle-group">
              <button
                class="toggle-btn active"
                id="modeDatagramBtn"
                onclick="setMode('datagram')"
              >
                Datagram
              </button>
              <button
                class="toggle-btn"
                id="modeStreamBtn"
                onclick="setMode('subgroup')"
              >
                Subgroup
              </button>
            </div>
          </div>
          <button
            class="btn primary"
            id="subscribeBtn"
            onclick="doSubscribe()"
            disabled
          >
            Subscribe
          </button>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Active tracks</div>
          <div class="tracks-list" id="tracksList">
            <div style="font-size: 12px; color: var(--text3); padding: 2px">
              No active subscriptions
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Filter log</div>
          <div class="toggle-group">
            <button class="toggle-btn active" onclick="setFilter('all', this)">
              All
            </button>
            <button class="toggle-btn" onclick="setFilter('recv', this)">
              Data
            </button>
            <button class="toggle-btn" onclick="setFilter('error', this)">
              Errors
            </button>
          </div>
        </div>

        <div class="sidebar-footer">
          MOQ draft-16 · WebTransport<br />
          <span id="urlNote" style="color: var(--text3)"></span>
        </div>
      </div>

      <div class="content">
        <div class="video-preview" id="videoPreview" style="display: flex">
          <video
            id="videoPlayer"
            controls
            autoplay
            style="width: 100%; border-radius: var(--radius)"
          ></video>
        </div>
        <div class="stats-bar">
          <div class="stat-cell">
            <div class="stat-label">Received</div>
            <div class="stat-value" id="statReceived">0</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Gaps</div>
            <div class="stat-value" id="statGaps">0</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Errors</div>
            <div class="stat-value" id="statErrors">0</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Rate</div>
            <div class="stat-value" id="statRate">0/s</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Last group</div>
            <div class="stat-value" id="statGroup">—</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Last object</div>
            <div class="stat-value" id="statObject">—</div>
          </div>
        </div>
        <div class="log-area" id="logArea"></div>
        <div class="bottom-bar">
          <button class="bottom-btn" id="clearLogBtn">Clear</button>
          <button class="bottom-btn" id="pauseBtn">Pause</button>

          <div style="flex: 1"></div>
          <button class="bottom-btn" id="exportLogBtn">Export</button>
          <label
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              font-size: 12px;
              color: var(--text2);
              cursor: pointer;
            "
          >
            <input
              type="checkbox"
              id="autoScroll"
              checked
              style="accent-color: var(--accent)"
            />
            Auto-scroll
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
